<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeveloperX — Reset Password · Daichiro</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy:#071a3e; --gold:#C9A84C; --gold-lt:#f0c96e; --border:rgba(255,255,255,0.09); --muted:rgba(255,255,255,0.45); }
  html, body { min-height: 100vh; font-family: 'Inter', sans-serif; background: #060e22; color: #fff; -webkit-font-smoothing: antialiased; }
  .bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bg-deco::before { content: ''; position: absolute; top: -120px; right: -120px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.07), transparent 70%); }
  .bg-deco::after { content: ''; position: absolute; bottom: -80px; left: -80px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(15,45,94,0.6), transparent 70%); }
  .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(ellipse 90% 80% at 50% 40%, rgba(0,0,0,0.6), transparent); }
  .page { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .card { width: 100%; max-width: 440px; background: rgba(10,26,58,0.7); backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--border); border-radius: 24px; padding: 48px 44px; box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 64px rgba(0,0,0,0.5), 0 0 80px rgba(201,168,76,0.04); animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes cardIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 34px; }
  .brand-icon { width: 44px; height: 44px; border-radius: 13px; background: linear-gradient(135deg, var(--gold), #e0a830); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(201,168,76,0.35); font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--navy); }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; letter-spacing: -0.02em; }
  .brand-sub { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.28em; color: var(--gold); margin-top: 1px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.7; }
  .field { margin-bottom: 22px; }
  .label { display: block; font-size: 10px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
  .input-wrap { position: relative; }
  .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.2); pointer-events: none; transition: color 0.2s; }
  .input-wrap:focus-within .input-icon { color: var(--gold); }
  input { width: 100%; padding: 14px 16px 14px 46px; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border); border-radius: 12px; color: #fff; font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.22s, background 0.22s, box-shadow 0.22s; }
  input::placeholder { color: rgba(255,255,255,0.18); }
  input:focus { border-color: var(--gold); background: rgba(201,168,76,0.06); box-shadow: 0 0 0 4px rgba(201,168,76,0.1); }
  .alert { display: flex; align-items: flex-start; gap: 10px; padding: 13px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 24px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
  .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--gold), #e0a830); border: none; border-radius: 12px; color: var(--navy); font-size: 13px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 24px rgba(201,168,76,0.3); transition: transform 0.2s, box-shadow 0.2s; margin-top: 4px; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,168,76,0.45); }
  .back-row { text-align: center; margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--border); }
  .back-link { color: var(--gold); font-size: 13px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .back-link:hover { color: var(--gold-lt); }
</style>
</head>
<body>
<div class="bg-deco"></div>
<div class="bg-grid"></div>
<div class="page">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">D</div>
      <div>
        <div class="brand-name">Daichiro</div>
        <div class="brand-sub">Developer Portal</div>
      </div>
    </div>

    <h1>Set New Password</h1>
    <p class="sub">Choose a strong, secure password for your developer account.</p>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label class="label">New Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" name="password" required minlength="6" placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
      </div>
      <div class="field">
        <label class="label">Confirm New Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <input type="password" name="confirm_password" required placeholder="Repeat password" autocomplete="new-password">
        </div>
      </div>
      <button type="submit" class="btn">Set New Password →</button>
    </form>

    <div class="back-row">
      <a href="{{ url_for('developer.login') }}" class="back-link">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Login
      </a>
    </div>
  </div>
</div>
</body>
</html>
