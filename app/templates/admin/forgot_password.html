<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Daichiro Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>document.documentElement.style.visibility='hidden'</script>
    <script src="https://cdn.tailwindcss.com" onload="document.documentElement.style.visibility=''"></script>
    <script>setTimeout(function(){document.documentElement.style.visibility=''},2000)</script>
    <script>tailwind.config={theme:{extend:{colors:{'school-navy':'#0F2D5E','school-gold':'#C9A84C','school-muted':'#6B7A8D'}}}}</script>
    <style>.form-input{width:100%;padding:14px 18px;background:white;border:2px solid #E8ECF0;border-radius:12px;font-size:.875rem;color:#0F2D5E;font-weight:600;transition:border-color .2s,box-shadow .2s;outline:none}.form-input::placeholder{color:#9BA8B5;font-weight:400}.form-input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,.12)}</style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center px-4 py-12"
      style="background:linear-gradient(135deg,#071a3e 0%,#0F2D5E 100%);">
<div class="fixed inset-0 opacity-[0.04] pointer-events-none" style="background-image:radial-gradient(circle,#C9A84C 1px,transparent 1px);background-size:36px 36px;"></div>
<div class="relative z-10 w-full max-w-sm mx-auto">
    <a href="{{ url_for('admin.login') }}" class="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 hover:text-school-gold transition-colors mb-8">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        Back to Sign In
    </a>
    <div class="text-center mb-8">
        <h1 class="font-bold text-2xl text-white">Daichiro</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-school-gold/70 mt-1">Staff Portal</p>
    </div>
    <div class="bg-white rounded-[24px] shadow-[0_32px_80px_rgba(0,0,0,0.35)] overflow-hidden">
        <div class="bg-school-navy px-8 py-6 text-center">
            <div class="w-10 h-10 rounded-2xl bg-school-gold/20 flex items-center justify-center mx-auto mb-3">
                <svg class="w-5 h-5 text-school-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <h2 class="text-xl font-black text-white">Forgot Password</h2>
            <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 mt-1">Reset via email</p>
        </div>
        <div class="p-8">
            <p class="text-sm text-school-muted mb-6 text-center">Enter your registered email address. We'll send you a reset link valid for 30 minutes.</p>
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">Email Address</label>
                    <input type="email" name="email" required class="form-input" placeholder="your@email.com">
                </div>
                <button type="submit" class="w-full py-4 bg-school-navy text-white font-black text-sm uppercase tracking-wider rounded-xl hover:bg-[#0a2248] transition-all mt-2">
                    Send Reset Link →
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
