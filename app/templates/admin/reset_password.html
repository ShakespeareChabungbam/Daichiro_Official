<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Daichiro Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>document.documentElement.style.visibility='hidden'</script>
    <script src="https://cdn.tailwindcss.com" onload="document.documentElement.style.visibility=''"></script>
    <script>setTimeout(function(){document.documentElement.style.visibility=''},2000)</script>
    <script>tailwind.config={theme:{extend:{colors:{'school-navy':'#0F2D5E','school-gold':'#C9A84C','school-muted':'#6B7A8D'}}}}</script>
    <style>.form-input{width:100%;padding:14px 18px;background:white;border:2px solid #E8ECF0;border-radius:12px;font-size:.875rem;color:#0F2D5E;font-weight:600;transition:border-color .2s,box-shadow .2s;outline:none;padding-right:3rem}.form-input::placeholder{color:#9BA8B5;font-weight:400}.form-input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,.12)}</style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center px-4 py-12"
      style="background:linear-gradient(135deg,#071a3e 0%,#0F2D5E 100%);">
<div class="fixed inset-0 opacity-[0.04] pointer-events-none" style="background-image:radial-gradient(circle,#C9A84C 1px,transparent 1px);background-size:36px 36px;"></div>
<div class="relative z-10 w-full max-w-sm mx-auto">
    <div class="text-center mb-8">
        <h1 class="font-bold text-2xl text-white">Daichiro</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-school-gold/70 mt-1">Staff Portal</p>
    </div>
    <div class="bg-white rounded-[24px] shadow-[0_32px_80px_rgba(0,0,0,0.35)] overflow-hidden">
        <div class="bg-school-navy px-8 py-6 text-center">
            <div class="w-10 h-10 rounded-2xl bg-school-gold/20 flex items-center justify-center mx-auto mb-3">
                <svg class="w-5 h-5 text-school-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <h2 class="text-xl font-black text-white">Reset Credentials</h2>
            <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 mt-1">Update your username &amp; password</p>
        </div>
        <div class="p-8">
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">New Username <span class="text-gray-400 font-normal normal-case tracking-normal">(optional — leave blank to keep current)</span></label>
                    <input type="text" name="new_username" class="form-input" placeholder="Enter new username" autocomplete="username" style="padding-right:1rem !important;">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">New Password</label>
                    <div class="relative">
                        <input type="password" name="new_password" id="np" required oninput="chk(this.value)" class="form-input" placeholder="Min 8 chars · uppercase · number · symbol">
                        <button type="button" onclick="tog('np')" class="absolute right-3 top-1/2 -translate-y-1/2 text-school-muted hover:text-school-gold">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                    <div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div id="sb" class="h-full rounded-full transition-all" style="width:0%"></div></div>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">Confirm Password</label>
                    <div class="relative">
                        <input type="password" name="confirm_password" id="cp" required oninput="mtch()" class="form-input" placeholder="Re-enter new password">
                        <button type="button" onclick="tog('cp')" class="absolute right-3 top-1/2 -translate-y-1/2 text-school-muted hover:text-school-gold">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                    <p id="ml" class="text-xs mt-1 hidden"></p>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div id="r1" class="flex items-center gap-1.5 text-gray-400"><span>○</span> 8+ characters</div>
                    <div id="r2" class="flex items-center gap-1.5 text-gray-400"><span>○</span> Uppercase</div>
                    <div id="r3" class="flex items-center gap-1.5 text-gray-400"><span>○</span> Lowercase</div>
                    <div id="r4" class="flex items-center gap-1.5 text-gray-400"><span>○</span> Number</div>
                    <div id="r5" class="flex items-center gap-1.5 text-gray-400 col-span-2"><span>○</span> Special character</div>
                </div>
                <button type="submit" class="w-full py-4 bg-school-navy text-white font-black text-sm uppercase tracking-wider rounded-xl hover:bg-[#0a2248] transition-all mt-2">
                    Reset Password →
                </button>
            </form>
        </div>
    </div>
</div>
<script>
function tog(id){const i=document.getElementById(id);const btn=i.nextElementSibling;const showing=i.type==='password';i.type=showing?'text':'password';btn.innerHTML=showing?'<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>':'<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>';}
function req(id,ok){const el=document.getElementById(id);el.querySelector('span').textContent=ok?'✓':'○';el.className='flex items-center gap-1.5 '+(ok?'text-emerald-500':'text-gray-400')+(id==='r5'?' col-span-2':'');}
function chk(pw){const s=[pw.length>=8,/[A-Z]/.test(pw),/[a-z]/.test(pw),/\d/.test(pw),/[!@#$%^&*]/.test(pw)];['r1','r2','r3','r4','r5'].forEach((id,i)=>req(id,s[i]));const score=s.filter(Boolean).length;const bar=document.getElementById('sb');bar.style.width=(score/5*100)+'%';const c=['transparent','#ef4444','#f97316','#eab308','#22c55e','#10b981'][score];bar.style.background=c;mtch();}
function mtch(){const p=document.getElementById('np').value,c=document.getElementById('cp').value,l=document.getElementById('ml');if(!c){l.classList.add('hidden');return;}l.classList.remove('hidden');l.textContent=p===c?'✓ Passwords match':'✗ Passwords do not match';l.className='text-xs mt-1 '+(p===c?'text-emerald-500':'text-red-500');}
</script>
</body>
</html>
