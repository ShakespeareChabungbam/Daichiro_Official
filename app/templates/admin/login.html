<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal — Daichiro Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>document.documentElement.style.visibility='hidden'</script>
    <script src="https://cdn.tailwindcss.com" onload="document.documentElement.style.visibility=''"></script>
    <script>setTimeout(function(){document.documentElement.style.visibility=''},2000)</script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    },
                    colors: {
                        'school-navy': '#0F2D5E',
                        'school-gold': '#C9A84C',
                        'school-light': '#F5F6F8',
                        'school-mid': '#E8ECF0',
                        'school-muted': '#6B7A8D'
                    }
                }
            }
        }
    </script>
    <style>
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: white;
            border: 2px solid #E8ECF0;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #0F2D5E;
            font-weight: 600;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-input::placeholder { color: #9BA8B5; font-weight: 400; }
        .form-input:focus { border-color: #C9A84C; box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
    </style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center px-4 py-12"
      style="background: linear-gradient(135deg, #071a3e 0%, #0F2D5E 100%);">

    <!-- Background dot pattern -->
    <div class="fixed inset-0 opacity-[0.04] pointer-events-none" style="background-image: radial-gradient(circle, #C9A84C 1px, transparent 1px); background-size: 36px 36px;"></div>

    <div class="relative z-10 w-full max-w-sm mx-auto">

        <!-- Back link -->
        <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 hover:text-school-gold transition-colors mb-8">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            Back to Website
        </a>

        <!-- Brand -->
        <div class="text-center mb-8">

            <h1 class="font-serif text-2xl font-black text-white">Daichiro</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-school-gold/70 mt-1">Staff Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-[24px] shadow-[0_32px_80px_rgba(0,0,0,0.35)] overflow-hidden">
            <!-- Card header -->
            <div class="bg-school-navy px-8 py-6 text-center">
                <div class="w-10 h-10 rounded-2xl bg-school-gold/20 flex items-center justify-center mx-auto mb-3">
                    <svg class="w-5 h-5 text-school-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <h2 class="font-serif text-xl font-black text-white">Staff Sign In</h2>
                <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 mt-1">Secure Access</p>
            </div>

            <!-- Card body -->
            <div class="p-8">
                <!-- Flash messages -->

                <form action="{{ url_for('admin.login') }}" method="POST" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div>
                        <label for="admin-user" class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">Username</label>
                        <input id="admin-user" name="username" type="text" required autocomplete="one-time-code"
                               class="form-input" placeholder="Enter username">
                    </div>
                    <div>
                        <label for="admin-pass" class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">Password</label>
                        <div class="relative">
                            <input id="admin-pass" name="password" type="password" required autocomplete="new-password"
                                   class="form-input" placeholder="Enter password" style="padding-right:3rem;">
                            <button type="button" id="eye-btn" onclick="togglePass()" tabindex="-1"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-school-muted hover:text-school-gold transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit"
                            class="w-full py-4 bg-school-navy text-white font-black text-sm uppercase tracking-wider rounded-xl hover:bg-[#0a2248] transition-all hover:-translate-y-0.5 shadow-lg shadow-school-navy/20 mt-2">
                        Sign In →
                    </button>
                </form>
                <div class="mt-5 text-center">
                    <a href="{{ url_for('admin.forgot_password') }}"
                       class="text-xs font-semibold text-school-muted hover:text-school-gold transition-colors">
                        Forgot your password?
                    </a>
                </div>
            </div>
        </div>

        <p class="text-center text-[10px] text-white/25 mt-8 uppercase tracking-widest">
            © 2026 Daichiro Professional Skills Academy
        </p>
    </div>

    <script>
    const _eyeOpen = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>`;
    const _eyeSlash = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`;
    function togglePass() {
        const inp = document.getElementById('admin-pass');
        const btn = document.getElementById('eye-btn');
        const showing = inp.type === 'password';
        inp.type = showing ? 'text' : 'password';
        btn.innerHTML = showing ? _eyeSlash : _eyeOpen;
    }
    </script>
</body>
</html>
