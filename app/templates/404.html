{% extends "base.html" %}

{% block title %}Page Not Found - Daichiro Official{% endblock %}

    <h1 class="text-6xl font-serif text-amber-500 mb-4">404</h1>
    <h2 class="text-2xl font-medium text-white mb-6">Page Not Found</h2>

</div>
{% endblock %}
