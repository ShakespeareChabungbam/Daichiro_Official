<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Daichiro Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>document.documentElement.style.visibility='hidden'</script>
    <script src="https://cdn.tailwindcss.com" onload="document.documentElement.style.visibility=''"></script>
    <script>setTimeout(function(){document.documentElement.style.visibility=''},2000)</script>
    <script>tailwind.config={theme:{extend:{colors:{'zinc-900':'#0F2D5E','amber-500':'#C9A84C','zinc-600':'#6B7A8D'}}}}</script>
    <style>.form-input{width:100%;padding:14px 18px;background:#1a1a2e;border:2px solid #2d2d3f;border-radius:12px;font-size:.875rem;color:white;font-weight:500;transition:border-color .2s;outline:none}.form-input::placeholder{color:#555}.form-input:focus{border-color:#C9A84C}</style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center px-4 py-12"
      style="background:linear-gradient(135deg,#0a0a1a 0%,#14142b 100%);">
<div class="relative z-10 w-full max-w-sm mx-auto">
    <a href="{{ url_for('employee.login') }}" class="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 hover:text-yellow-400 transition-colors mb-8">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        Back to Sign In
    </a>
    <div class="text-center mb-8">
        <h1 class="font-bold text-2xl text-white">Daichiro</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-yellow-400/70 mt-1">Staff Portal</p>
    </div>
    <div class="bg-zinc-900 border border-zinc-800 rounded-[24px] shadow-2xl overflow-hidden">
        <div class="bg-zinc-800 px-8 py-6 text-center border-b border-zinc-700">
            <div class="w-10 h-10 rounded-2xl bg-amber-500/20 flex items-center justify-center mx-auto mb-3">
                <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <h2 class="text-xl font-black text-white">Forgot Password</h2>
            <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 mt-1">Reset via email</p>
        </div>
        <div class="p-8">
            <p class="text-sm text-zinc-600 mb-6 text-center">Enter the email registered in your profile. A reset link will be sent (valid 30 min).</p>
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Email Address</label>
                    <input type="email" name="email" required class="form-input" placeholder="your@email.com">
                </div>
                <button type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-400 text-black font-black text-sm uppercase tracking-wider rounded-xl transition-all mt-2">
                    Send Reset Link →
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
