<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login — Daichiro Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>document.documentElement.style.visibility='hidden'</script>
    <script src="https://cdn.tailwindcss.com" onload="document.documentElement.style.visibility=''"></script>
    <script>setTimeout(function(){document.documentElement.style.visibility=''},2000)</script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter','sans-serif'], nike: ['Anton','sans-serif'] },
                colors: { black: '#0C2547' }
            }}
        }
    </script>
</head>
<body class="min-h-screen bg-[#0C2547] flex items-center justify-center font-sans">

<div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="text-center mb-10">
        <h1 class="font-nike text-4xl uppercase tracking-tighter text-white">Daichiro</h1>
        <p class="text-xs font-bold uppercase tracking-[0.3em] text-amber-400 mt-1">Employee Portal</p>
    </div>

    <div class="bg-[#FFFFFF]/5 border border-white/10 rounded-2xl p-8 backdrop-blur-sm">
        <h2 class="text-xl font-bold text-white mb-6">Sign in to your account</h2>

        <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label class="text-xs font-bold uppercase tracking-widest text-white/50 block mb-2">Username</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full bg-[#FFFFFF]/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-amber-400 transition-colors text-sm"
                       placeholder="your.name">
            </div>
            <div>
                <label class="text-xs font-bold uppercase tracking-widest text-white/50 block mb-2">Password</label>
                <input type="password" name="password" id="password" required autocomplete="current-password"
                       class="w-full bg-[#FFFFFF]/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-amber-400 transition-colors text-sm"
                       placeholder="••••••••••">
            </div>
            <button type="submit"
                    class="w-full bg-amber-500 hover:bg-amber-400 text-black font-bold uppercase tracking-widest py-3 rounded-xl transition-colors text-sm mt-2">
                Sign In →
            </button>
        </form>
        <div class="mt-5 text-center">
            <a href="{{ url_for('employee.forgot_password') }}"
               class="text-xs font-semibold text-white/40 hover:text-amber-400 transition-colors">
                Forgot your password?
            </a>
        </div>
    </div>

    <p class="text-center text-xs text-white/20 mt-6 uppercase tracking-widest">
        Admin? <a href="{{ url_for('admin.login') }}" class="text-white/40 hover:text-amber-400 transition-colors">Go to Admin Login</a>
    </p>
</div>

</body>
</html>
