<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daichiro — Secure Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>document.documentElement.style.visibility='hidden'</script>
    <script src="https://cdn.tailwindcss.com" onload="document.documentElement.style.visibility=''"></script>
    <script>setTimeout(function(){document.documentElement.style.visibility=''},2000)</script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    },
                    colors: {
                        'school-navy': '#0F2D5E',
                        'school-gold': '#C9A84C',
                        'school-light': '#F5F6F8',
                        'school-mid': '#E8ECF0',
                        'school-muted': '#6B7A8D'
                    }
                }
            }
        }
    </script>
    <style>
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: white;
            border: 2px solid #E8ECF0;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #0F2D5E;
            font-weight: 600;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-input::placeholder { color: #9BA8B5; font-weight: 400; }
        .form-input:focus { border-color: #C9A84C; box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
    </style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center bg-school-light px-4 py-12"
      style="background: linear-gradient(135deg, #071a3e 0%, #0F2D5E 100%);">

    <!-- Background dot pattern -->
    <div class="fixed inset-0 opacity-[0.04] pointer-events-none" style="background-image: radial-gradient(circle, #C9A84C 1px, transparent 1px); background-size: 36px 36px;"></div>

    <div class="relative z-10 w-full max-w-md mx-auto">

        <!-- Back link -->
        <a href="/" class="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 hover:text-school-gold transition-colors mb-8">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            Back to Website
        </a>

        <!-- Logo / Brand -->
        <div class="text-center mb-8">

            <h1 class="font-serif text-2xl font-black text-white tracking-wide">Daichiro</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-school-gold/70 mt-1">Professional Skills Academy</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-[24px] shadow-[0_32px_80px_rgba(0,0,0,0.35)] overflow-hidden">
            <!-- Card header bar -->
            <div class="bg-school-navy px-8 py-6 text-center">
                <div class="w-10 h-10 rounded-2xl bg-school-gold/20 flex items-center justify-center mx-auto mb-3">
                    <svg class="w-5 h-5 text-school-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h2 class="font-serif text-xl font-black text-white">Secure Portal</h2>
                <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-white/40 mt-1">Staff &amp; Authorised Access Only</p>
            </div>

            <!-- Card body -->
            <div class="p-8">
                <!-- Flash messages -->

                <form action="{{ url_for('client.login') }}" method="POST" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div>
                        <label for="session-id" class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">Assessment ID</label>
                        <input id="session-id" name="username" type="text" required autocomplete="one-time-code"
                               class="form-input" placeholder="Enter your Assessment ID">
                    </div>
                    <div>
                        <label for="session-pass" class="block text-[10px] font-black uppercase tracking-[0.25em] text-school-muted mb-2">Passcode</label>
                        <div class="relative">
                            <input id="session-pass" name="password" type="password" required autocomplete="new-password"
                                   class="form-input" placeholder="Enter your Passcode" style="padding-right:3rem;">
                            <button type="button" onclick="togglePass()" tabindex="-1"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-school-muted hover:text-school-gold transition-colors">
                                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit"
                            class="w-full py-4 bg-school-navy text-white font-black text-sm uppercase tracking-wider rounded-xl hover:bg-[#0a2248] transition-all hover:-translate-y-0.5 shadow-lg shadow-school-navy/20 mt-2">
                        Begin Assessment →
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center text-[10px] text-white/25 mt-8 uppercase tracking-widest">
            © 2026 Daichiro Professional Skills Academy
        </p>
    </div>

    <script>
    function togglePass() {
        const inp = document.getElementById('session-pass');
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }
    </script>
</body>
</html>
