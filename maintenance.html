<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance — Daichiro Academy</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#0F2D5E;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow:hidden;
  }
  body::before {
    content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(ellipse at 30% 40%, rgba(201,168,76,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(201,168,76,0.05) 0%, transparent 50%);
    animation: drift 12s ease-in-out infinite alternate;
  }
  @keyframes drift { from{transform:translate(0,0)} to{transform:translate(2%,3%)} }
  body::after {
    content:''; position:fixed; inset:0;
    background-image: radial-gradient(circle, rgba(201,168,76,0.12) 1px, transparent 1px);
    background-size:36px 36px; pointer-events:none;
  }
  .card {
    position:relative; z-index:10; text-align:center;
    max-width:520px; width:90%; padding:3rem 2.5rem;
  }
  .spinner-wrap { display:flex; justify-content:center; margin-bottom:2rem; position:relative; }
  .spinner {
    width:64px; height:64px; border-radius:50%;
    border:3px solid rgba(201,168,76,0.2);
    border-top-color:#C9A84C;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .gear {
    position:absolute; font-size:28px;
    top:50%; left:50%; transform:translate(-50%,-50%);
    animation: spin 6s linear infinite reverse;
  }
  .label {
    font-size:9px; font-weight:900; text-transform:uppercase;
    letter-spacing:.4em; color:#C9A84C; margin-bottom:1rem;
  }
  h1 {
    font-size:2.2rem; font-weight:900; color:#fff; margin-bottom:1rem;
    line-height:1.2; font-family:Georgia,serif;
  }
  p {
    color:rgba(255,255,255,0.55); font-size:.95rem; line-height:1.7;
    margin-bottom:1.5rem;
  }
  .divider {
    width:48px; height:3px; background:#C9A84C;
    border-radius:99px; margin:1.5rem auto;
  }
  .eta-box {
    background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3);
    border-radius:16px; padding:1.2rem 2rem; margin:1.5rem 0;
  }
  .eta-label {
    font-size:9px; font-weight:900; text-transform:uppercase;
    letter-spacing:.3em; color:rgba(201,168,76,0.7); margin-bottom:.4rem;
  }
  .eta-date {
    font-size:1.4rem; font-weight:900; color:#C9A84C;
    letter-spacing:.05em;
  }
  .dot-wrap { display:flex; align-items:center; justify-content:center; gap:.5rem; margin-top:1.5rem; }
  .dot { width:6px; height:6px; border-radius:50%; background:#C9A84C; }
  .dot:nth-child(1) { animation:pulse 1.5s ease-in-out .0s infinite; }
  .dot:nth-child(2) { animation:pulse 1.5s ease-in-out .3s infinite; }
  .dot:nth-child(3) { animation:pulse 1.5s ease-in-out .6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
  .status-text { font-size:.75rem; color:rgba(255,255,255,.3); margin-left:.5rem; }
  .footer { margin-top:2rem; font-size:.75rem; color:rgba(255,255,255,.2); }
  .footer a { color:rgba(201,168,76,.5); text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <span class="gear">⚙️</span>
  </div>

  <p class="label">Daichiro Professional Skills Academy</p>
  <h1>We'll Be Back Soon</h1>
  <div class="divider"></div>

  <p>Our website is currently undergoing scheduled maintenance.<br>
     We appreciate your patience.</p>

  <div class="eta-box">
    <p class="eta-label">Expected Back By</p>
    <p class="eta-date">27 March 2026</p>
  </div>

  <div class="dot-wrap">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <span class="status-text">Maintenance in progress</span>
  </div>

  <p class="footer" style="margin-top:2rem;">
    Need urgent help? <a href="tel:9366862651">9366862651</a>
  </p>
  <p class="footer">© 2026 Daichiro Academy · <a href="https://daichiro.in">daichiro.in</a></p>
</div>
</body>
</html>
